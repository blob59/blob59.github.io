<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FicaraWall</title>
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:#0b0f1a;
      color:#e8eefc;
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      max-width:720px;
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      padding:20px;
      box-shadow:0 10px 25px rgba(0,0,0,.35);
    }
    h1{margin:0 0 8px}
    p{margin:0 0 10px; color:#a9b5d4; line-height:1.4}
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(124,92,255,.18);
      border:1px solid rgba(124,92,255,.35);
      margin-top:10px;
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>FicaraWall 🧷</h1>
    <p>Installazione base riuscita.</p>
    <p>Prossimo step: login + muro personale + salvataggio online.</p>
    <div class="badge">francoficara.com/ficarawall</div>
  </div>
</body>
</html>
